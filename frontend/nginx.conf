server {
    listen 80;
    server_name _;

    # Proxy API calls to the api service over the compose network. The trailing
    # slash strips the /api prefix: /api/health -> api:8000/health. This keeps the
    # browser on a single origin, so no CORS is needed in Docker.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the built SPA; fall back to index.html.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
